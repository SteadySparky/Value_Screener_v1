name: Daily Stock Screen

on:
  workflow_dispatch:      # This adds the "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas pandas_ta

      - name: Run Screener
        run: python screener.py  # This MUST match your file name exactly
